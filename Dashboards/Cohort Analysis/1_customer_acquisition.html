<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Customer Acquisition by Cohort Year</title>
<style>
  body { font-family: sans-serif; background: #fff; padding: 32px; color: #2C2C2A; }
  h2 { font-size: 16px; font-weight: 500; color: #5F5E5A; margin-bottom: 8px; }
  .legend { display: flex; gap: 16px; margin-bottom: 12px; font-size: 12px; color: #5F5E5A; }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .sq { width: 10px; height: 10px; border-radius: 2px; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 4px; }
</style>
</head><body>
<h2>Total customers by cohort year</h2>
<div class="legend">
  <span><span class="sq" style="background:#378ADD;"></span>Customers acquired</span>
  <span class="badge" style="background:#FAEEDA;color:#854F0B;">2020 — COVID impact</span>
  <span class="badge" style="background:#E6F1FB;color:#185FA5;">2024 — partial year</span>
</div>
<div style="position:relative;height:320px;"><canvas id="c"></canvas></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const years=[2015,2016,2017,2018,2019,2020,2021,2022,2023,2024];
const customers=[2825,3397,4068,7446,7755,3031,4663,9010,5890,1402];
const colors=years.map(y=>y===2020?'#EF9F27':y===2024?'#85B7EB':'#378ADD');
new Chart(document.getElementById('c'),{type:'bar',data:{labels:years,datasets:[{data:customers,backgroundColor:colors,borderWidth:1,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' '+ctx.raw.toLocaleString()+' customers'}}},scales:{x:{grid:{display:false},ticks:{font:{size:11}}},y:{grid:{color:'rgba(0,0,0,0.06)'},ticks:{callback:v=>(v/1000).toFixed(0)+'k'}}}}});
</script>
</body></html>
